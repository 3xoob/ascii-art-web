<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-size: 100px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FFB6C1;
        }
        .error-container {
            font-size: 60px;
            text-align: center;
        }
        h1 {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>{{.ErrorCode}} - ERROR</h1>
        <p>{{.ErrorMessage}}</p>
        <button style="padding: 8px 16px; font-size: 16px;" onclick="window.location.href = 'http://localhost:8080/'">Go to Main Page</button>
    </div>
</body>
</html>
