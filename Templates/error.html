<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-size: 100px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }
        .error-container {
            font-size: 40px;
            text-align: center;
        }
        h1 {
            font-size: 15vw;
            background-image: url(https://unsplash.it/800);
            background-size: cover;
            background-clip: text;
            -webkit-background-clip: text;
            
  }

        #errorb {
            color: white;
            border: 2px solid #ffffff;
            padding: 8px 16px;
            font-size: 16px;
            transition: box-shadow 0.2s ease-in-out;
            text-decoration: underline ;
            font-weight: bold;
            background-color:  black;
        }
        #errorb:hover {
            background: radial-gradient(black ,rgba(6, 6, 6, 0.2) 80%);
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>Oops!</h1>
        <p>{{.ErrorCode}} - ERROR</p>
        <p>{{.ErrorMessage}}</p>
        <button id="errorb" onclick="window.location.href = 'http://localhost:8080/'">Go to Main Page</button>
    </div>
</body>
</html>
